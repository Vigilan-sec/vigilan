version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: suricata/Dockerfile
    container_name: vigilan-lab-gateway
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    networks:
      lan:
        ipv4_address: 10.10.0.1
      wan:
        ipv4_address: 172.20.0.1
    volumes:
      - eve-lab-data:/var/log/suricata
      - ./scripts/lab:/lab
    environment:
      - SURICATA_HOME_NET=[10.10.0.0/24]
      - LAN_IFACE=eth0
      - WAN_IFACE=eth1
    entrypoint: ["/bin/bash", "/lab/gateway-entrypoint.sh"]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigilan-lab-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - eve-lab-data:/data/eve
      - db-lab-data:/data/db
    environment:
      - VIGILAN_EVE_JSON_PATH=/data/eve/eve.json
      - VIGILAN_DATABASE_URL=sqlite+aiosqlite:////data/db/vigilan.db
      - VIGILAN_CORS_ORIGINS=["http://localhost:3000","http://localhost:${FRONTEND_PORT:-3000}"]
      - VIGILAN_EVE_WATCHER_START_AT_END=${EVE_START_AT_END:-true}
      - VIGILAN_DEBUG=${DEBUG:-false}
    depends_on:
      gateway:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/api/ws/alerts}
        - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
    container_name: vigilan-lab-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  victim:
    image: ubuntu:22.04
    container_name: vigilan-lab-victim
    networks:
      lan:
        ipv4_address: 10.10.0.10
    cap_add:
      - NET_ADMIN
    volumes:
      - ./scripts/lab:/lab
    environment:
      - DEFAULT_GATEWAY=10.10.0.1
    entrypoint: ["/bin/bash", "/lab/victim-entrypoint.sh"]

  attacker:
    image: nicolaka/netshoot
    container_name: vigilan-lab-attacker
    networks:
      lan:
        ipv4_address: 10.10.0.20
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command: ["bash", "-lc", "ip route replace default via 10.10.0.1 && sleep infinity"]
    volumes:
      - ./scripts/lab:/lab

  malicious-web:
    image: nginx:alpine
    container_name: vigilan-lab-malicious-web
    networks:
      wan:
        ipv4_address: 172.20.0.80

  dns:
    image: andyshinn/dnsmasq:2.85
    container_name: vigilan-lab-dns
    networks:
      wan:
        ipv4_address: 172.20.0.53
    command: ["-k", "--log-facility=-", "--address=/bad.test/172.20.0.80"]

volumes:
  eve-lab-data:
    driver: local
  db-lab-data:
    driver: local

networks:
  lan:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
