services:

#services réseaux pour le lab IDS
  gateway:
    build:
      context: ./suricata
      dockerfile: Dockerfile
    container_name: gateway
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    networks:
      lan:
        ipv4_address: 10.77.0.2
      lan2:
        ipv4_address: 10.78.0.2
      wan:
        ipv4_address: 172.29.0.2
    volumes:
      - eve-lab-data:/var/log/suricata
      - ./scripts/lab:/lab
    environment:
      - SURICATA_HOME_NET=[10.77.0.0/24,10.78.0.0/24]
      - LAN_IFACE=eth0
      - LAN2_IFACE=eth1
      - WAN_IFACE=eth2
      - SURICATA_MODE=ips
      - TZ=Europe/Paris
    entrypoint: ["/bin/bash", "/lab/gateway-entrypoint.sh"]
    restart: unless-stopped

# Backend python pour le traitement du système
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - eve-lab-data:/data/eve
      - db-lab-data:/data/db
      - ./chroma:/app/chroma:ro
      - ./data/pdf:/app/data/pdf:ro
    environment:
      - VIGILAN_EVE_JSON_PATH=/data/eve/eve.json
      - VIGILAN_DATABASE_URL=sqlite+aiosqlite:////data/db/vigilan.db
      - VIGILAN_CORS_ORIGINS=["http://localhost:3000","http://localhost:${FRONTEND_PORT:-3000}"]
      - VIGILAN_SECURE_UI_ORIGIN=https://localhost:${SECURE_UI_PORT:-3443}
      - VIGILAN_EVE_WATCHER_START_AT_END=${EVE_START_AT_END:-true}
      - VIGILAN_DEBUG=${DEBUG:-false}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - TZ=Europe/Paris
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      gateway:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


# app node pour l'interface utilisateur
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-}
        - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
    container_name: frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
      - TZ=Europe/Paris
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  secure-ui:
    image: caddy:2.10-alpine
    container_name: secure-ui
    ports:
      - "${SECURE_UI_PORT:-3443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped


# 1st vistim
  victim:
    build:
      context: ./scripts/lab
      dockerfile: victim.Dockerfile
    container_name: victim
    networks:
      lan2:
        ipv4_address: 10.78.0.10
    ports:
      - "127.0.0.1:2223:22"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./scripts/lab:/lab
      - ssh-keys-victim:/etc/ssh
    environment:
      - DEFAULT_GATEWAY=10.78.0.2
    entrypoint: ["/bin/bash", "/lab/victim-entrypoint.sh"]

  attacker:
    image: nicolaka/netshoot
    container_name: attacker
    networks:
      lan:
        ipv4_address: 10.77.0.20
    ports:
      - "127.0.0.1:2222:22"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./scripts/lab:/lab
      - ssh-keys-attacker:/etc/ssh
    environment:
      - DEFAULT_GATEWAY=10.77.0.2
    entrypoint: ["/bin/bash", "/lab/attacker-entrypoint.sh"]

  malicious-web:
    image: nginx:alpine
    container_name: malicious-web
    networks:
      wan:
        ipv4_address: 172.29.0.80
    volumes:
      - ./scripts/lab/web:/usr/share/nginx/html:ro
      - ./scripts/lab/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  dns:
    image: coredns/coredns:1.11.1
    container_name: dns
    networks:
      wan:
        ipv4_address: 172.29.0.53
    volumes:
      - ./scripts/lab/Corefile:/etc/coredns/Corefile:ro
    command: ["-conf", "/etc/coredns/Corefile"]

volumes:
  eve-lab-data:
    driver: local
  db-lab-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  ssh-keys-attacker:
    driver: local
  ssh-keys-victim:
    driver: local

networks:
  lan:
    driver: bridge
    ipam:
      config:
        - subnet: 10.77.0.0/24
  lan2:
    driver: bridge
    ipam:
      config:
        - subnet: 10.78.0.0/24
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24
